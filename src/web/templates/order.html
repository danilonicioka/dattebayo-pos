<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dattebayo - Controle de Pedidos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/order-list.css}">
</head>

<body>
    <div class="container">
        <div class="header">
            <a href="/sales-summary" class="admin-nav-btn">
                <i class="fas fa-user-shield"></i> Adm
            </a>
            <a href="/new-order" class="new-order-btn"><i class="fas fa-plus"></i> Novo Pedido</a>
            <img th:src="@{/dattebayo-logo.png}" alt="Dattebayo Logo" />
            <div>
                <h1><i class="fas fa-clipboard-list"></i> Controle de Pedidos</h1>
                <div class="nav-links">
                    <a href="/" class="nav-link active"><i class="fas fa-clipboard-list"></i> Pedidos</a>

                    <a href="/kitchen" class="nav-link"><i class="fas fa-utensils"></i> Cozinha</a>
                    <a href="/history" class="nav-link"><i class="fas fa-history"></i> Histórico</a>
                    <a href="/stock-management" class="nav-link"><i class="fas fa-boxes"></i> Estoque</a>
                </div>
            </div>
            <!-- <p>Order Management</p> -->
        </div>

        <div class="content">
            <div th:if="${param.success}" class="success-message">
                Pedido criado com sucesso!
            </div>
            <div th:if="${param.updated}" class="success-message">
                Pedido atualizado com sucesso!
            </div>
            <div th:if="${param.paid}" class="success-message">
                Pedido finalizado com sucesso!
            </div>
            <div th:if="${param.bulkPaid}" class="success-message">
                Todos os pedidos foram finalizados com sucesso!
            </div>

            <div class="active-orders-section">
                <div class="active-orders-header">
                    <h2><i class="fas fa-clipboard-list"></i> Pedidos Ativos</h2>
                    <div style="display: flex; gap: 10px;">
                        <button type="button" class="action-btn" onclick="openBulkConcludeModal()"
                            style="background-color: var(--secondary-color); color: white; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-weight: 600;">
                            <i class="fas fa-check-double"></i> Concluir Todos
                        </button>
                        <button class="refresh-btn" onclick="refreshActiveOrders()"><i class="fas fa-sync-alt"></i>
                            Atualizar</button>
                    </div>
                </div>
                <div class="active-orders-grid" id="activeOrdersGrid">
                    <div th:if="${activeOrders == null or activeOrders.isEmpty()}" class="no-active-orders">
                        Nenhum pedido ativo
                    </div>
                    <div class="active-order-card" th:each="order : ${activeOrders}">
                        <div class="active-order-header">
                            <div class="active-order-table" th:text="${order.tableNumber != null and !order.tableNumber.isEmpty() ? order.tableNumber : 'Pedido #' + order.id}"></div>
                            <div class="active-order-status" th:classappend="${order.status.name().toLowerCase()}"
                                th:text="${order.status.name() == 'PENDING' ? 'Pendente' : 
                                          order.status.name() == 'PREPARING' ? 'Preparando' : 
                                          order.status.name() == 'READY' ? 'Pronto' : 'Concluído'}"></div>
                        </div>
                        <div class="active-order-time" th:text="${#temporals.format(order.createdAt, 'HH:mm')}"></div>
                        <div class="active-order-items">
                            <div class="active-order-item" th:each="item : ${order.items}">
                                <div style="display: flex; flex-direction: column;">
                                    <span th:text="${item.quantity} + 'x ' + ${item.menuItemName}" style="font-weight: 600;"></span>
                                    <div class="item-variations" th:if="${item.comboItemDetails != null and !item.comboItemDetails.isEmpty()}" style="font-size: 1.1em; color: #000; padding-left: 8px; margin: 2px 0; line-height: 1.2;">
                                        <span th:each="detail : ${item.comboItemDetails}" th:text="${detail}" style="display: block; font-weight: 500;"></span>
                                    </div>
                                    <div class="item-variations" th:if="${(item.comboItemDetails == null or item.comboItemDetails.isEmpty()) and item.variations != null and !item.variations.isEmpty()}" style="font-size: 0.9em; color: #444; padding-left: 8px; line-height: 1.1;">
                                        <span th:each="variation : ${item.variations}" th:if="${variation.selected}" th:text="${variation.name}" style="display: block;"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="active-order-total"
                            th:text="'Total: R$' + ${#numbers.formatDecimal(order.total, 1, 0)}"></div>
                        <div style="display: flex; gap: 8px; margin-top: 15px;">
                            <a th:href="@{'/orders/' + ${order.id} + '/edit'}" class="action-btn edit-order-btn"
                                style="flex: 1;">
                                <i class="fas fa-edit"></i> Editar
                            </a>

                            <button type="button" class="action-btn cancel-order-btn"
                                th:onclick="'openCancelModal(' + ${order.id} + ')'" style="flex: 1;">
                                <i class="fas fa-times"></i> Cancelar
                            </button>

                            <form th:action="@{'/orders/' + ${order.id} + '/mark-paid'}" method="post"
                                style="flex: 1; margin: 0;">
                                <button type="submit" class="action-btn mark-paid-btn">
                                    <i class="fas fa-check-double"></i> Concluir
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom Confirmation Modal -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Confirmação</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body" style="padding: 30px 25px; text-align: center;">
                <i id="modalIcon" class="fas fa-exclamation-triangle"
                    style="font-size: 3em; color: var(--primary-color); margin-bottom: 20px; display: block;"></i>
                <p id="modalMessage" style="font-size: 1.1em; color: var(--text-dark); line-height: 1.5;"></p>
            </div>
            <div class="modal-footer">
                <button onclick="closeModal()" class="cancel-btn">Não, Voltar</button>
                <button id="modalConfirmBtn" class="confirm-btn">Sim, Confirmar</button>
            </div>
        </div>
    </div>

    <!-- Hidden Forms for Actions -->
    <form id="bulkConcludeForm" th:action="@{/orders/conclude-all}" method="post" style="display: none;"></form>
    <form id="cancelOrderForm" method="post" style="display: none;"></form>

    <script th:inline="javascript">
        function refreshActiveOrders() {
            location.reload();
        }

        // Auto-refresh active orders every 10 seconds
        setInterval(function () {
            refreshActiveOrders();
        }, 10000);

        const modal = document.getElementById('confirmModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');
        const modalIcon = document.getElementById('modalIcon');
        const confirmBtn = document.getElementById('modalConfirmBtn');

        function openBulkConcludeModal() {
            modalTitle.textContent = 'Concluir Todos';
            modalMessage.textContent = 'Tem certeza que deseja concluir TODOS os pedidos ativos? Esta ação moverá todos para o histórico.';
            modalIcon.className = 'fas fa-check-double';
            modalIcon.style.color = 'var(--secondary-color)';
            confirmBtn.onclick = () => {
                document.getElementById('bulkConcludeForm').submit();
            };
            modal.style.display = 'block';
        }

        function openCancelModal(orderId) {
            modalTitle.textContent = 'Cancelar Pedido';
            modalMessage.textContent = 'Deseja realmente cancelar este pedido? O estoque dos itens será reposto automaticamente.';
            modalIcon.className = 'fas fa-trash-alt';
            modalIcon.style.color = '#dc3545';
            confirmBtn.onclick = () => {
                const form = document.getElementById('cancelOrderForm');
                form.action = '/orders/' + orderId + '/cancel';
                form.submit();
            };
            modal.style.display = 'block';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        // Close modal when clicking outside
        window.onclick = function (event) {
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>

</html>
