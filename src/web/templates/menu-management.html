<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Menu - Dattebayo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/order-entry.css}">
    <link rel="stylesheet" th:href="@{/css/menu-management.css}">
    <style>
        .save-bar {
            background: white;
            padding: 30px;
            margin-top: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow-soft);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 15px;
            border: 1px solid #eee;
        }

        .save-btn {
            background: var(--success-green);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 400px;
            justify-content: center;
        }

        .save-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .save-btn:not(:disabled):hover {
            background: #388e3c;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
        }

        .pending-text {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.95rem;
        }

        .dirty-input {
            border-color: var(--primary-orange) !important;
            background-color: #fff8f5 !important;
            box-shadow: 0 0 0 2px rgba(255, 107, 0, 0.1);
        }

        .alert-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            z-index: 9999;
            transform: translateX(200%);
            transition: transform 0.3s ease-in-out;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .alert-toast.show {
            transform: translateX(0);
        }

        .alert-success { background-color: var(--success-green); }
        .alert-error { background-color: #e74c3c; }

        /* Variations Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
            animation: fadeIn 0.2s ease-out;
        }
        .variations-modal {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 650px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .variations-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .variations-header h2 {
            margin: 0;
            color: var(--text-primary);
            font-size: 1.4rem;
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #888;
            cursor: pointer;
            transition: color 0.2s;
        }
        .close-modal:hover { color: #333; }
        .variation-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        .variation-row input, .variation-row select {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95rem;
            width: 100%;
        }
        .btn-variation {
            padding: 8px 15px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-outline {
            background: transparent;
            border: 1px dashed var(--primary-orange);
            color: var(--primary-orange);
            width: 100%;
            margin-top: 10px;
        }
        .btn-outline:hover {
            background: rgba(255, 107, 0, 0.1);
        }
        .btn-remove {
            background: #fee;
            color: #e74c3c;
            padding: 8px 12px;
        }
        .btn-remove:hover {
            background: #fdd;
        }
        .modal-actions {
            margin-top: 25px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .btn-save-modal {
            background: var(--success-green);
            color: white;
        }
        .btn-save-modal:hover {
            background: #388e3c;
        }
        .btn-manage-variations {
            background: #f8f8f8;
            color: #666;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-manage-variations:hover {
            background: #eee;
            color: #333;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <a href="/" class="admin-nav-btn">
                <i class="fas fa-arrow-left"></i> Voltar para Pedidos
            </a>
            <img th:src="@{/dattebayo-logo.png}" alt="Dattebayo Logo" />
            <div>
                <h1><i class="fas fa-cog"></i> Configurar Menu</h1>
                <div class="nav-links">
                    <a href="/sales-summary" class="nav-link"><i class="fas fa-chart-pie"></i> Resumo</a>
                    <a href="/menu-management" class="nav-link active"><i class="fas fa-cog"></i> Menu</a>
                </div>
            </div>
        </div>

        <div class="content">

            <!-- SECTION 2: Inventário por Categoria -->
            <section class="config-section">
                <h2 class="section-title"><i class="fas fa-utensils"></i> Gerenciar Itens</h2>

                <div th:each="category : ${categories}" class="category-group">
                    <h3
                        style="margin: 30px 0 20px 0; color: #555; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px;">
                        <i class="fas fa-chevron-right" style="font-size: 0.8em; color: var(--primary-orange);"></i>
                        <span th:text="${category}">Category</span>
                    </h3>

                    <div class="management-grid">
                        <div th:each="item : ${menuItems}" th:if="${item.category == category}" class="management-item">

                            <!-- Status & Title Header -->
                            <div class="item-header">
                                <div class="item-title-box">
                                    <h3 th:text="${item.name}">Item Name</h3>
                                    <span th:id="'status-' + ${item.id}" class="status-badge"
                                        th:classappend="${item.available} ? 'status-available' : 'status-unavailable'"
                                        th:text="${item.available} ? 'Disponível' : 'Indisponível'">
                                    </span>
                                </div>
                                <div class="availability-toggle">
                                    <label class="switch">
                                        <input type="checkbox" th:checked="${item.available}"
                                            th:onchange="'toggleItem(' + ${item.id} + ', this.checked)'">
                                        <span class="slider"></span>
                                    </label>
                                </div>
                            </div>

                            <div class="pricing-container">
                                <!-- SECTION: Auto Pricing (Standard) -->
                                <div class="pricing-block auto-block"
                                    th:classappend="${item.manualPriceEnabled} ? 'inactive'">
                                    <div class="block-header">
                                        <span class="block-label"><i class="fas fa-calculator"></i> Automático</span>

                                    </div>

                                    <div class="price-display-group">
                                        <div class="price-main-row">
                                            <span class="label">Preço:</span>
                                            <span class="value final-price"
                                                th:text="'R$' + ${#numbers.formatDecimal(item.price, 1, 0)}"></span>
                                        </div>
                                    </div>
                                </div>

                                <!-- SECTION: Manual Pricing -->
                                <div class="pricing-block manual-block"
                                    th:classappend="${item.manualPriceEnabled} ? 'active-mode'">
                                    <div class="block-header" style="justify-content: space-between;">
                                        <div class="manual-toggle-wrapper">
                                            <label class="switch tiny-switch" title="Ativar Preço Manual">
                                                <input type="checkbox" th:id="'manual-enabled-' + ${item.id}"
                                                    th:checked="${item.manualPriceEnabled}"
                                                    th:onchange="'toggleManualPrice(' + ${item.id} + ', this.checked)'">
                                                <span class="slider"></span>
                                            </label>
                                            <span class="block-label">Manual</span>
                                        </div>
                                    </div>

                                    <div class="manual-input-area">
                                        <input type="number" th:id="'manual-price-' + ${item.id}" step="1"
                                            th:value="${item.manualPrice != null ? item.manualPrice : item.basePrice}"
                                            class="manual-price-input"
                                            th:onchange="'updateManualPrice(' + ${item.id} + ')'">
                                    </div>
                                </div>
                            </div>
                            
                            <button class="btn-manage-variations" th:onclick="'openVariationsModal(' + ${item.id} + ')'">
                                <i class="fas fa-tags"></i> Gerenciar Variações
                            </button>

                        </div> <!-- End Item Card -->
                    </div> <!-- End Grid -->
                </div>
            </section>

            <!-- SECTION: Combos -->
            <section class="config-section" style="margin-top: 30px;">
                <h2 class="section-title"><i class="fas fa-layer-group"></i> Gerenciar Combos</h2>

                <div id="combos-list" class="management-grid">
                    <!-- combos loaded via JS -->
                </div>

                <button class="save-btn" style="max-width:300px; margin-top:20px;" onclick="openComboModal(null)">
                    <i class="fas fa-plus"></i> Criar Novo Combo
                </button>
            </section>

            <div id="save-bar" class="save-bar">
                <span id="pending-counter" class="pending-text" style="display: none; margin-bottom: 5px;">Existem
                    alterações não salvas</span>
                <button id="save-btn" class="save-btn" onclick="saveAllChanges()" disabled>
                    <i class="fas fa-save"></i> Salvar Alterações
                </button>
            </div>
        </div>
    </div>

    <!-- COMBO MODAL -->
    <div id="combo-modal" class="modal-overlay">
        <div class="variations-modal" style="max-width:700px;">
            <div class="variations-header">
                <h2 id="combo-modal-title">Criar Combo</h2>
                <button class="close-modal" onclick="closeComboModal()">&times;</button>
            </div>
            <div style="display:grid; gap:12px; margin-bottom:15px;">
                <input id="combo-name" type="text" placeholder="Nome do Combo *" style="padding:10px; border:1px solid #ddd; border-radius:8px; font-size:1rem;">
                <input id="combo-description" type="text" placeholder="Descrição (opcional)" style="padding:10px; border:1px solid #ddd; border-radius:8px; font-size:1rem;">
                <input id="combo-price" type="number" min="0" step="1" placeholder="Preço do Combo (R$) *" style="padding:10px; border:1px solid #ddd; border-radius:8px; font-size:1rem;">
            </div>
            <h3 style="margin-bottom:10px; color:#555;"><i class="fas fa-utensils"></i> Itens Incluídos no Combo</h3>
            <div id="combo-items-container"></div>
            <button class="btn-variation btn-outline" style="margin-top:10px;" onclick="addComboItemRow()">
                <i class="fas fa-plus"></i> Adicionar Item
            </button>
            <div class="modal-actions">
                <button class="btn-variation" style="background:#f0f0f0; color:#333;" onclick="closeComboModal()">Cancelar</button>
                <button id="combo-save-btn" class="btn-variation btn-save-modal" onclick="saveCombo()">
                    <i class="fas fa-save"></i> Salvar Combo
                </button>
            </div>
        </div>
    </div>

    <!-- Variations Modal -->
    <div id="variations-modal" class="modal-overlay">
        <div class="variations-modal">
            <div class="variations-header">
                <h2 id="variations-modal-title">Variações do Item</h2>
                <button class="close-modal" onclick="closeVariationsModal()">&times;</button>
            </div>
            
            <div id="variations-container">
                <!-- Variations will be populated here -->
            </div>
            
            <button class="btn-variation btn-outline" onclick="addVariationRow()">
                <i class="fas fa-plus"></i> Adicionar Variação
            </button>
            
            <div class="modal-actions">
                <button class="btn-variation" style="background: #f0f0f0; color: #333;" onclick="closeVariationsModal()">Cancelar</button>
                <button class="btn-variation btn-save-modal" onclick="saveVariations()">
                    <i class="fas fa-save"></i> Salvar Variações
                </button>
            </div>
        </div>
    </div>

    <div id="alert-toast" class="alert-toast"></div>

    <script th:inline="javascript">
        let pendingChanges = {};
        let currentEditingItem = null;

        function openVariationsModal(id) {
            fetch(`/api/menu/${id}`)
                .then(res => {
                    if (!res.ok) throw new Error('Falha ao carregar');
                    return res.json();
                })
                .then(item => {
                    currentEditingItem = item;
                    document.getElementById('variations-modal-title').textContent = `Variações: ${item.name}`;
                    renderVariations(item.variations || []);
                    document.getElementById('variations-modal').classList.add('active');
                })
                .catch(err => {
                    console.error(err);
                    showToast('Erro ao carregar os dados do item', 'error');
                });
        }

        function renderVariations(variations) {
            const container = document.getElementById('variations-container');
            container.innerHTML = '';
            
            if (variations.length === 0) {
                container.innerHTML = '<p style="color: #888; text-align: center; margin-bottom: 15px;">Nenhuma variação cadastrada.</p>';
                return;
            }
            
            variations.forEach(variation => {
                const row = document.createElement('div');
                row.className = 'variation-row';
                row.innerHTML = `
                    <input type="text" placeholder="Nome (Ex: De Salmão)" value="${variation.name || ''}" class="var-name" required>
                    <select class="var-type">
                        <option value="SINGLE" ${variation.type === 'SINGLE' ? 'selected' : ''}>Única</option>
                        <option value="MULTIPLE" ${variation.type === 'MULTIPLE' ? 'selected' : ''}>Múltipla</option>
                    </select>
                    <input type="number" step="0.01" placeholder="Adicional (R$)" value="${variation.additionalPrice || 0}" class="var-price" required>
                    <button class="btn-variation btn-remove" onclick="removeVariationRow(this)" title="Remover">
                        <i class="fas fa-trash"></i>
                    </button>
                    <!-- Campos ocultos para manter os metadados -->
                    <input type="hidden" class="var-id" value="${variation.id || ''}">
                    <input type="hidden" class="var-stock-qty" value="${variation.stockQuantity !== null && variation.stockQuantity !== undefined ? variation.stockQuantity : ''}">
                    <input type="hidden" class="var-stock-mult" value="${variation.stockMultiplier || 1}">
                `;
                container.appendChild(row);
            });
        }

        function addVariationRow() {
            const container = document.getElementById('variations-container');
            const emptyMsg = container.querySelector('p');
            if (emptyMsg) container.removeChild(emptyMsg);
            
            const row = document.createElement('div');
            row.className = 'variation-row';
            row.innerHTML = `
                <input type="text" placeholder="Nome (Ex: De Salmão)" class="var-name" required>
                <select class="var-type">
                    <option value="SINGLE">Única</option>
                    <option value="MULTIPLE">Múltipla</option>
                </select>
                <input type="number" step="0.01" placeholder="Adicional (R$)" value="0.00" class="var-price" required>
                <button class="btn-variation btn-remove" onclick="removeVariationRow(this)" title="Remover">
                    <i class="fas fa-trash"></i>
                </button>
                <input type="hidden" class="var-id" value="">
                <input type="hidden" class="var-stock-qty" value="">
                <input type="hidden" class="var-stock-mult" value="1">
            `;
            container.appendChild(row);
        }

        function removeVariationRow(btn) {
            btn.closest('.variation-row').remove();
            const container = document.getElementById('variations-container');
            if (container.children.length === 0) {
                container.innerHTML = '<p style="color: #888; text-align: center; margin-bottom: 15px;">Nenhuma variação cadastrada.</p>';
            }
        }

        function closeVariationsModal() {
            document.getElementById('variations-modal').classList.remove('active');
            currentEditingItem = null;
        }

        function saveVariations() {
            if (!currentEditingItem) return;
            
            const container = document.getElementById('variations-container');
            const rows = container.querySelectorAll('.variation-row');
            
            const updatedVariations = [];
            let isValid = true;
            
            rows.forEach(row => {
                const nameControl = row.querySelector('.var-name');
                const name = nameControl.value.trim();
                
                if (!name) {
                    isValid = false;
                    nameControl.style.borderColor = '#e74c3c';
                    return;
                } else {
                    nameControl.style.borderColor = '#ddd';
                }
                
                const type = row.querySelector('.var-type').value;
                const priceMatch = parseFloat(row.querySelector('.var-price').value);
                const price = isNaN(priceMatch) ? 0 : priceMatch;
                
                const idVal = row.querySelector('.var-id').value;
                const stockQtyVal = row.querySelector('.var-stock-qty').value;
                const stockMultVal = row.querySelector('.var-stock-mult').value;
                
                const variationObj = {
                    name: name,
                    type: type,
                    additionalPrice: price,
                    stockMultiplier: parseInt(stockMultVal) || 1
                };
                
                if (idVal) variationObj.id = parseInt(idVal);
                if (stockQtyVal !== '' && stockQtyVal !== 'undefined') variationObj.stockQuantity = parseInt(stockQtyVal);
                
                updatedVariations.push(variationObj);
            });
            
            if (!isValid) {
                showToast('Preencha os campos obrigatórios (Nome).', 'error');
                return;
            }
            
            const payload = { ...currentEditingItem, variations: updatedVariations };
            
            const btn = document.querySelector('.btn-save-modal');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';
            btn.disabled = true;
            
            fetch(`/api/menu/${currentEditingItem.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if (res.ok) {
                    showToast('Variações salvas com sucesso!');
                    closeVariationsModal();
                } else {
                    throw new Error('Falha ao salvar');
                }
            })
            .catch(err => {
                console.error(err);
                showToast('Erro ao salvar variações.', 'error');
            })
            .finally(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
            });
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('alert-toast');
            toast.textContent = message;
            toast.className = `alert-toast ${type === 'success' ? 'alert-success' : 'alert-error'} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function updateSaveButton() {
            const hasChanges = Object.keys(pendingChanges).length > 0;
            const btn = document.getElementById('save-btn');
            const counter = document.getElementById('pending-counter');

            btn.disabled = !hasChanges;
            counter.style.display = hasChanges ? 'block' : 'none';
        }

        function markInputDirty(id) {
            const input = document.getElementById('manual-price-' + id);
            if (input) input.classList.add('dirty-input');
        }

        function toggleItem(id, isAvailable) {
            if (!pendingChanges[id]) pendingChanges[id] = {};
            pendingChanges[id].available = isAvailable;
            
            const statusBadge = document.getElementById('status-' + id);
            if (isAvailable) {
                statusBadge.textContent = 'Disponível';
                statusBadge.className = 'status-badge status-available';
            } else {
                statusBadge.textContent = 'Indisponível';
                statusBadge.className = 'status-badge status-unavailable';
            }
            updateSaveButton();
        }

        function toggleManualPrice(id, isEnabled) {
            if (!pendingChanges[id]) pendingChanges[id] = {};
            pendingChanges[id].manualPriceEnabled = isEnabled;
            
            const block = document.querySelector(`.management-item:has(#manual-enabled-${id}) .manual-block`);
            const autoBlock = document.querySelector(`.management-item:has(#manual-enabled-${id}) .auto-block`);
            if (isEnabled) {
                block.classList.add('active-mode');
                autoBlock.classList.add('inactive');
            } else {
                block.classList.remove('active-mode');
                autoBlock.classList.remove('inactive');
            }
            updateSaveButton();
        }

        function updateManualPrice(id) {
            if (!pendingChanges[id]) pendingChanges[id] = {};
            const price = document.getElementById('manual-price-' + id).value;
            pendingChanges[id].manualPrice = parseFloat(price);
            markInputDirty(id);
            updateSaveButton();
        }

        function saveAllChanges() {
            const saveBtn = document.getElementById('save-btn');
            const originalContent = saveBtn.innerHTML;

            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';

            const payload = {
                items: Object.keys(pendingChanges).map(id => ({
                    id: parseInt(id),
                    ...pendingChanges[id]
                }))
            };

            fetch('/api/menu/batch-update', {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            })
            .then(function(response) {
                if (response.ok) {
                    showToast('Alterações salvas com sucesso!');
                    setTimeout(function() { location.reload(); }, 1500);
                } else {
                    throw new Error('Erro ao salvar.');
                }
            })
            .catch(function(error) {
                console.error('Error saving changes:', error);
                showToast('Erro ao salvar alterações. Tente novamente.', 'error');
                saveBtn.disabled = false;
                saveBtn.innerHTML = originalContent;
            });
        }

        // ══════════════════════════════════════════════
        // COMBOS MANAGEMENT
        // ══════════════════════════════════════════════
        var allMenuItemsForCombos = [];
        var currentEditingComboId = null;

        document.addEventListener('DOMContentLoaded', function () {
            loadCombos();
            fetch('/api/menu')
                .then(function(r) { return r.json(); })
                .then(function(data) { allMenuItemsForCombos = data; });
        });

        function loadCombos() {
            fetch('/api/combos')
                .then(function(r) { return r.json(); })
                .then(renderCombos)
                .catch(function(err) { console.error('Erro ao carregar combos:', err); });
        }

        function renderCombos(combos) {
            var list = document.getElementById('combos-list');
            if (!combos || combos.length === 0) {
                list.innerHTML = '<p style="color:#888; padding:20px;">Nenhum combo cadastrado ainda.</p>';
                return;
            }
            list.innerHTML = combos.map(function(combo) {
                var itemsHtml = (combo.items || []).map(function(i) { return i.quantity + 'x ' + i.menuItemName; }).join('<br>');
                var descHtml = combo.description ? '<em>' + combo.description + '</em><br>' : '';
                var escapedName = combo.name.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
                return '<div class="management-item">' +
                    '<div class="item-header">' +
                        '<div class="item-title-box">' +
                            '<h3>' + combo.name + '</h3>' +
                            '<span class="status-badge ' + (combo.available ? 'status-available' : 'status-unavailable') + '">' +
                                (combo.available ? 'Disponível' : 'Indisponível') + '</span>' +
                        '</div>' +
                        '<label class="switch"><input type="checkbox" ' + (combo.available ? 'checked' : '') +
                            ' onchange="toggleComboAvailability(' + combo.id + ', this.checked)"><span class="slider"></span></label>' +
                    '</div>' +
                    '<div style="color:#555;font-size:.95rem;margin:8px 0;">' + descHtml + '<strong>Preço: R$' + Number(combo.price).toFixed(0) + '</strong></div>' +
                    '<div style="font-size:.9rem;color:#777;margin-bottom:10px;"><strong>Itens:</strong><br>' + itemsHtml + '</div>' +
                    '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +
                        '<button class="btn-manage-variations" onclick="openComboModal(' + combo.id + ')"><i class="fas fa-edit"></i> Editar</button>' +
                        '<button class="btn-manage-variations" style="color:#e74c3c;" onclick="deleteCombo(' + combo.id + ',\'' + escapedName + '\')"><i class="fas fa-trash"></i> Excluir</button>' +
                    '</div></div>';
            }).join('');
        }

        function openComboModal(comboId) {
            currentEditingComboId = comboId;
            document.getElementById('combo-name').value = '';
            document.getElementById('combo-description').value = '';
            document.getElementById('combo-price').value = '';
            document.getElementById('combo-items-container').innerHTML = '';
            if (comboId) {
                document.getElementById('combo-modal-title').textContent = 'Editar Combo';
                fetch('/api/combos/' + comboId)
                    .then(function(r) { return r.json(); })
                    .then(function(combo) {
                        document.getElementById('combo-name').value = combo.name || '';
                        document.getElementById('combo-description').value = combo.description || '';
                        document.getElementById('combo-price').value = combo.price || '';
            (combo.items || []).forEach(function(ci) { 
                addComboItemRow(ci.menuItemId, ci.allowedVariationIds, ci.quantity); 
            });
                    });
            } else {
                document.getElementById('combo-modal-title').textContent = 'Criar Combo';
                addComboItemRow(null, null, 1);
            }
            document.getElementById('combo-modal').classList.add('active');
        }

        function closeComboModal() {
            document.getElementById('combo-modal').classList.remove('active');
            currentEditingComboId = null;
        }

        function addComboItemRow(selectedId, selectedVarIds, qty) {
            selectedId = selectedId || null;
            selectedVarIds = selectedVarIds || [];
            qty = qty || 1;
            var container = document.getElementById('combo-items-container');
            var row = document.createElement('div');
            row.className = 'variation-row';
            row.style.gridTemplateColumns = '2fr 2fr 1fr auto';
            
            var itemOptions = allMenuItemsForCombos.map(function(m) {
                return '<option value="' + m.id + '"' + (m.id === selectedId ? ' selected' : '') + '>' + m.name + '</option>';
            }).join('');

            row.innerHTML =
                '<select class="ci-menu-item" style="padding:8px;border:1px solid #ddd;border-radius:6px;font-size:.95rem;width:100%;" onchange="updateComboVarDropdown(this)">' +
                '<option value="">Item...</option>' + itemOptions + '</select>' +
                '<select class="ci-variation" multiple style="padding:4px;border:1px solid #ddd;border-radius:6px;font-size:.85rem;width:100%;min-height:60px;">' +
                '</select>' +
                '<input type="number" min="1" value="' + qty + '" class="ci-qty" style="padding:8px;border:1px solid #ddd;border-radius:6px;font-size:.95rem;width:100%;">' +
                '<button class="btn-variation btn-remove" onclick="this.closest(\'.variation-row\').remove()" title="Remover"><i class="fas fa-trash"></i></button>';
            
            container.appendChild(row);

            // Populate initial variations if item is selected
            if (selectedId) {
                var select = row.querySelector('.ci-menu-item');
                updateComboVarDropdown(select, selectedVarIds);
            }
        }

        function updateComboVarDropdown(itemSelect, selectedVarIds) {
            var row = itemSelect.closest('.variation-row');
            var varSelect = row.querySelector('.ci-variation');
            var itemId = parseInt(itemSelect.value);
            varSelect.innerHTML = '';
            
            if (!itemId) {
                varSelect.innerHTML = '<option value="">Selecione um item</option>';
                varSelect.disabled = true;
                return;
            }
            
            var item = allMenuItemsForCombos.find(function(m) { return m.id === itemId; });
            if (item && item.variations && item.variations.length > 0) {
                item.variations.forEach(function(v) {
                    var opt = document.createElement('option');
                    opt.value = v.id;
                    opt.textContent = v.name;
                    if (selectedVarIds && selectedVarIds.includes(v.id)) opt.selected = true;
                    varSelect.appendChild(opt);
                });
                varSelect.disabled = false;
            } else {
                varSelect.innerHTML = '<option value="">Sem variações</option>';
                varSelect.disabled = true;
            }
        }

        function saveCombo() {
            var name = document.getElementById('combo-name').value.trim();
            var description = document.getElementById('combo-description').value.trim();
            var price = parseFloat(document.getElementById('combo-price').value);
            if (!name) { showToast('Informe o nome do combo.', 'error'); return; }
            if (isNaN(price) || price < 0) { showToast('Informe um preço válido.', 'error'); return; }
            var rows = document.querySelectorAll('#combo-items-container .variation-row');
            var items = [];
            var valid = true;
            rows.forEach(function(row) {
                var menuItemId = parseInt(row.querySelector('.ci-menu-item').value);
                var variationSelect = row.querySelector('.ci-variation');
                var variationIds = Array.from(variationSelect.selectedOptions).map(opt => parseInt(opt.value)).filter(v => !isNaN(v));
                var q = parseInt(row.querySelector('.ci-qty').value) || 1;
                
                if (!menuItemId) { valid = false; return; }
                
                // If the item has variations, at least one MUST be selected
                var item = allMenuItemsForCombos.find(function(m) { return m.id === menuItemId; });
                if (item && item.variations && item.variations.length > 0 && variationIds.length === 0) {
                    showToast('Selecione pelo menos uma variação permitida para o item "' + item.name + '".', 'error');
                    valid = false;
                    return;
                }
                
                items.push({ menuItemId: menuItemId, allowedVariationIds: variationIds, quantity: q });
            });
            if (!valid || items.length === 0) { showToast('Selecione pelo menos um item válido.', 'error'); return; }
            var payload = { name: name, description: description, price: price, available: true, items: items };
            var btn = document.getElementById('combo-save-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';
            var url = currentEditingComboId ? '/api/combos/' + currentEditingComboId : '/api/combos';
            var method = currentEditingComboId ? 'PUT' : 'POST';
            fetch(url, { method: method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
                .then(function(r) { if (!r.ok) throw new Error('Erro'); return r.json(); })
                .then(function() {
                    showToast(currentEditingComboId ? 'Combo atualizado!' : 'Combo criado!');
                    closeComboModal();
                    loadCombos();
                })
                .catch(function() { showToast('Erro ao salvar combo.', 'error'); })
                .finally(function() { btn.disabled = false; btn.innerHTML = '<i class="fas fa-save"></i> Salvar Combo'; });
        }

        function deleteCombo(id, name) {
            if (!confirm('Excluir o combo "' + name + '"?')) return;
            fetch('/api/combos/' + id, { method: 'DELETE' })
                .then(function(r) { if (!r.ok) throw new Error(); })
                .then(function() { showToast('Combo excluído.'); loadCombos(); })
                .catch(function() { showToast('Erro ao excluir combo.', 'error'); });
        }

        function toggleComboAvailability(id, available) {
            fetch('/api/combos/' + id + '/available', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ available: available })
            })
            .then(function(r) { if (!r.ok) throw new Error(); })
            .then(function() { showToast(available ? 'Combo disponível.' : 'Combo indisponível.'); loadCombos(); })
            .catch(function() { showToast('Erro ao alterar disponibilidade.', 'error'); });
        }

    </script>
</body>

</html>
