<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Menu - Dattebayo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/order-entry.css}">
    <link rel="stylesheet" th:href="@{/css/menu-management.css}">
    <style>
        .save-bar {
            background: white;
            padding: 30px;
            margin-top: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow-soft);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 15px;
            border: 1px solid #eee;
        }

        .save-btn {
            background: var(--success-green);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 400px;
            justify-content: center;
        }

        .save-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .save-btn:not(:disabled):hover {
            background: #388e3c;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
        }

        .pending-text {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.95rem;
        }

        .dirty-input {
            border-color: var(--primary-orange) !important;
            background-color: #fff8f5 !important;
            box-shadow: 0 0 0 2px rgba(255, 107, 0, 0.1);
        }

        .alert-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            z-index: 9999;
            transform: translateX(200%);
            transition: transform 0.3s ease-in-out;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .alert-toast.show {
            transform: translateX(0);
        }

        .alert-success { background-color: var(--success-green); }
        .alert-error { background-color: #e74c3c; }

        /* Variations Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
            animation: fadeIn 0.2s ease-out;
        }
        .variations-modal {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 650px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .variations-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .variations-header h2 {
            margin: 0;
            color: var(--text-primary);
            font-size: 1.4rem;
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #888;
            cursor: pointer;
            transition: color 0.2s;
        }
        .close-modal:hover { color: #333; }
        .variation-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        .variation-row input, .variation-row select {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95rem;
            width: 100%;
        }
        .btn-variation {
            padding: 8px 15px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-outline {
            background: transparent;
            border: 1px dashed var(--primary-orange);
            color: var(--primary-orange);
            width: 100%;
            margin-top: 10px;
        }
        .btn-outline:hover {
            background: rgba(255, 107, 0, 0.1);
        }
        .btn-remove {
            background: #fee;
            color: #e74c3c;
            padding: 8px 12px;
        }
        .btn-remove:hover {
            background: #fdd;
        }
        .modal-actions {
            margin-top: 25px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .btn-save-modal {
            background: var(--success-green);
            color: white;
        }
        .btn-save-modal:hover {
            background: #388e3c;
        }
        .btn-manage-variations {
            background: #f8f8f8;
            color: #666;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-manage-variations:hover {
            background: #eee;
            color: #333;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <a href="/" class="admin-nav-btn">
                <i class="fas fa-arrow-left"></i> Voltar para Pedidos
            </a>
            <img th:src="@{/dattebayo-logo.png}" alt="Dattebayo Logo" />
            <div>
                <h1><i class="fas fa-cog"></i> Configurar Menu</h1>
                <div class="nav-links">
                    <a href="/sales-summary" class="nav-link"><i class="fas fa-chart-pie"></i> Resumo</a>
                    <a href="/menu-management" class="nav-link active"><i class="fas fa-cog"></i> Menu</a>
                </div>
            </div>
        </div>

        <div class="content">

            <!-- SECTION 2: Inventário por Categoria -->
            <section class="config-section">
                <h2 class="section-title"><i class="fas fa-utensils"></i> Gerenciar Itens</h2>

                <div th:each="category : ${categories}" class="category-group">
                    <h3
                        style="margin: 30px 0 20px 0; color: #555; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px;">
                        <i class="fas fa-chevron-right" style="font-size: 0.8em; color: var(--primary-orange);"></i>
                        <span th:text="${category}">Category</span>
                    </h3>

                    <div class="management-grid">
                        <div th:each="item : ${menuItems}" th:if="${item.category == category}" class="management-item">

                            <!-- Status & Title Header -->
                            <div class="item-header">
                                <div class="item-title-box">
                                    <h3 th:text="${item.name}">Item Name</h3>
                                    <span th:id="'status-' + ${item.id}" class="status-badge"
                                        th:classappend="${item.available} ? 'status-available' : 'status-unavailable'"
                                        th:text="${item.available} ? 'Disponível' : 'Indisponível'">
                                    </span>
                                </div>
                                <div class="availability-toggle">
                                    <label class="switch">
                                        <input type="checkbox" th:checked="${item.available}"
                                            th:onchange="'toggleItem(' + ${item.id} + ', this.checked)'">
                                        <span class="slider"></span>
                                    </label>
                                </div>
                            </div>

                            <div class="pricing-container">
                                <!-- SECTION: Auto Pricing (Standard) -->
                                <div class="pricing-block auto-block"
                                    th:classappend="${item.manualPriceEnabled} ? 'inactive'">
                                    <div class="block-header">
                                        <span class="block-label"><i class="fas fa-calculator"></i> Automático</span>

                                    </div>

                                    <div class="price-display-group">
                                        <div class="price-main-row">
                                            <span class="label">Preço:</span>
                                            <span class="value final-price"
                                                th:text="'R$' + ${#numbers.formatDecimal(item.price, 1, 0)}"></span>
                                        </div>
                                    </div>
                                </div>

                                <!-- SECTION: Manual Pricing -->
                                <div class="pricing-block manual-block"
                                    th:classappend="${item.manualPriceEnabled} ? 'active-mode'">
                                    <div class="block-header" style="justify-content: space-between;">
                                        <div class="manual-toggle-wrapper">
                                            <label class="switch tiny-switch" title="Ativar Preço Manual">
                                                <input type="checkbox" th:id="'manual-enabled-' + ${item.id}"
                                                    th:checked="${item.manualPriceEnabled}"
                                                    th:onchange="'toggleManualPrice(' + ${item.id} + ', this.checked)'">
                                                <span class="slider"></span>
                                            </label>
                                            <span class="block-label">Manual</span>
                                        </div>
                                    </div>

                                    <div class="manual-input-area">
                                        <input type="number" th:id="'manual-price-' + ${item.id}" step="1"
                                            th:value="${item.manualPrice != null ? item.manualPrice : item.basePrice}"
                                            class="manual-price-input"
                                            th:onchange="'updateManualPrice(' + ${item.id} + ')'">
                                    </div>
                                </div>
                            </div>
                            
                            <button class="btn-manage-variations" th:onclick="'openVariationsModal(' + ${item.id} + ')'">
                                <i class="fas fa-tags"></i> Gerenciar Variações
                            </button>

                        </div> <!-- End Item Card -->
                    </div> <!-- End Grid -->
                </div>
            </section>

            <div id="save-bar" class="save-bar">
                <span id="pending-counter" class="pending-text" style="display: none; margin-bottom: 5px;">Existem
                    alterações não salvas</span>
                <button id="save-btn" class="save-btn" onclick="saveAllChanges()" disabled>
                    <i class="fas fa-save"></i> Salvar Alterações
                </button>
            </div>
        </div>
    </div>

    <!-- Variations Modal -->
    <div id="variations-modal" class="modal-overlay">
        <div class="variations-modal">
            <div class="variations-header">
                <h2 id="variations-modal-title">Variações do Item</h2>
                <button class="close-modal" onclick="closeVariationsModal()">&times;</button>
            </div>
            
            <div id="variations-container">
                <!-- Variations will be populated here -->
            </div>
            
            <button class="btn-variation btn-outline" onclick="addVariationRow()">
                <i class="fas fa-plus"></i> Adicionar Variação
            </button>
            
            <div class="modal-actions">
                <button class="btn-variation" style="background: #f0f0f0; color: #333;" onclick="closeVariationsModal()">Cancelar</button>
                <button class="btn-variation btn-save-modal" onclick="saveVariations()">
                    <i class="fas fa-save"></i> Salvar Variações
                </button>
            </div>
        </div>
    </div>

    <div id="alert-toast" class="alert-toast"></div>

    <script th:inline="javascript">
        let pendingChanges = {};
        let currentEditingItem = null;

        function openVariationsModal(id) {
            fetch(`/api/menu/${id}`)
                .then(res => {
                    if (!res.ok) throw new Error('Falha ao carregar');
                    return res.json();
                })
                .then(item => {
                    currentEditingItem = item;
                    document.getElementById('variations-modal-title').textContent = `Variações: ${item.name}`;
                    renderVariations(item.variations || []);
                    document.getElementById('variations-modal').classList.add('active');
                })
                .catch(err => {
                    console.error(err);
                    showToast('Erro ao carregar os dados do item', 'error');
                });
        }

        function renderVariations(variations) {
            const container = document.getElementById('variations-container');
            container.innerHTML = '';
            
            if (variations.length === 0) {
                container.innerHTML = '<p style="color: #888; text-align: center; margin-bottom: 15px;">Nenhuma variação cadastrada.</p>';
                return;
            }
            
            variations.forEach(variation => {
                const row = document.createElement('div');
                row.className = 'variation-row';
                row.innerHTML = `
                    <input type="text" placeholder="Nome (Ex: De Salmão)" value="${variation.name || ''}" class="var-name" required>
                    <select class="var-type">
                        <option value="SINGLE" ${variation.type === 'SINGLE' ? 'selected' : ''}>Única</option>
                        <option value="MULTIPLE" ${variation.type === 'MULTIPLE' ? 'selected' : ''}>Múltipla</option>
                    </select>
                    <input type="number" step="0.01" placeholder="Adicional (R$)" value="${variation.additionalPrice || 0}" class="var-price" required>
                    <button class="btn-variation btn-remove" onclick="removeVariationRow(this)" title="Remover">
                        <i class="fas fa-trash"></i>
                    </button>
                    <!-- Campos ocultos para manter os metadados -->
                    <input type="hidden" class="var-id" value="${variation.id || ''}">
                    <input type="hidden" class="var-stock-qty" value="${variation.stockQuantity !== null && variation.stockQuantity !== undefined ? variation.stockQuantity : ''}">
                    <input type="hidden" class="var-stock-mult" value="${variation.stockMultiplier || 1}">
                `;
                container.appendChild(row);
            });
        }

        function addVariationRow() {
            const container = document.getElementById('variations-container');
            const emptyMsg = container.querySelector('p');
            if (emptyMsg) container.removeChild(emptyMsg);
            
            const row = document.createElement('div');
            row.className = 'variation-row';
            row.innerHTML = `
                <input type="text" placeholder="Nome (Ex: De Salmão)" class="var-name" required>
                <select class="var-type">
                    <option value="SINGLE">Única</option>
                    <option value="MULTIPLE">Múltipla</option>
                </select>
                <input type="number" step="0.01" placeholder="Adicional (R$)" value="0.00" class="var-price" required>
                <button class="btn-variation btn-remove" onclick="removeVariationRow(this)" title="Remover">
                    <i class="fas fa-trash"></i>
                </button>
                <input type="hidden" class="var-id" value="">
                <input type="hidden" class="var-stock-qty" value="">
                <input type="hidden" class="var-stock-mult" value="1">
            `;
            container.appendChild(row);
        }

        function removeVariationRow(btn) {
            btn.closest('.variation-row').remove();
            const container = document.getElementById('variations-container');
            if (container.children.length === 0) {
                container.innerHTML = '<p style="color: #888; text-align: center; margin-bottom: 15px;">Nenhuma variação cadastrada.</p>';
            }
        }

        function closeVariationsModal() {
            document.getElementById('variations-modal').classList.remove('active');
            currentEditingItem = null;
        }

        function saveVariations() {
            if (!currentEditingItem) return;
            
            const container = document.getElementById('variations-container');
            const rows = container.querySelectorAll('.variation-row');
            
            const updatedVariations = [];
            let isValid = true;
            
            rows.forEach(row => {
                const nameControl = row.querySelector('.var-name');
                const name = nameControl.value.trim();
                
                if (!name) {
                    isValid = false;
                    nameControl.style.borderColor = '#e74c3c';
                    return;
                } else {
                    nameControl.style.borderColor = '#ddd';
                }
                
                const type = row.querySelector('.var-type').value;
                const priceMatch = parseFloat(row.querySelector('.var-price').value);
                const price = isNaN(priceMatch) ? 0 : priceMatch;
                
                const idVal = row.querySelector('.var-id').value;
                const stockQtyVal = row.querySelector('.var-stock-qty').value;
                const stockMultVal = row.querySelector('.var-stock-mult').value;
                
                const variationObj = {
                    name: name,
                    type: type,
                    additionalPrice: price,
                    stockMultiplier: parseInt(stockMultVal) || 1
                };
                
                if (idVal) variationObj.id = parseInt(idVal);
                if (stockQtyVal !== '' && stockQtyVal !== 'undefined') variationObj.stockQuantity = parseInt(stockQtyVal);
                
                updatedVariations.push(variationObj);
            });
            
            if (!isValid) {
                showToast('Preencha os campos obrigatórios (Nome).', 'error');
                return;
            }
            
            const payload = { ...currentEditingItem, variations: updatedVariations };
            
            const btn = document.querySelector('.btn-save-modal');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';
            btn.disabled = true;
            
            fetch(`/api/menu/${currentEditingItem.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if (res.ok) {
                    showToast('Variações salvas com sucesso!');
                    closeVariationsModal();
                } else {
                    throw new Error('Falha ao salvar');
                }
            })
            .catch(err => {
                console.error(err);
                showToast('Erro ao salvar variações.', 'error');
            })
            .finally(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
            });
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('alert-toast');
            toast.textContent = message;
            toast.className = `alert-toast ${type === 'success' ? 'alert-success' : 'alert-error'} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function updateSaveButton() {
            const hasChanges = Object.keys(pendingChanges).length > 0;
            const btn = document.getElementById('save-btn');
            const counter = document.getElementById('pending-counter');

            btn.disabled = !hasChanges;
            counter.style.display = hasChanges ? 'block' : 'none';
        }

        function markInputDirty(id) {
            const input = document.getElementById('manual-price-' + id);
            if (input) input.classList.add('dirty-input');
        }

        function toggleItem(id, isAvailable) {
            if (!pendingChanges[id]) pendingChanges[id] = {};
            pendingChanges[id].available = isAvailable;
            
            const statusBadge = document.getElementById('status-' + id);
            if (isAvailable) {
                statusBadge.textContent = 'Disponível';
                statusBadge.className = 'status-badge status-available';
            } else {
                statusBadge.textContent = 'Indisponível';
                statusBadge.className = 'status-badge status-unavailable';
            }
            updateSaveButton();
        }

        function toggleManualPrice(id, isEnabled) {
            if (!pendingChanges[id]) pendingChanges[id] = {};
            pendingChanges[id].manualPriceEnabled = isEnabled;
            
            const block = document.querySelector(`.management-item:has(#manual-enabled-${id}) .manual-block`);
            const autoBlock = document.querySelector(`.management-item:has(#manual-enabled-${id}) .auto-block`);
            if (isEnabled) {
                block.classList.add('active-mode');
                autoBlock.classList.add('inactive');
            } else {
                block.classList.remove('active-mode');
                autoBlock.classList.remove('inactive');
            }
            updateSaveButton();
        }

        function updateManualPrice(id) {
            if (!pendingChanges[id]) pendingChanges[id] = {};
            const price = document.getElementById('manual-price-' + id).value;
            pendingChanges[id].manualPrice = parseFloat(price);
            markInputDirty(id);
            updateSaveButton();
        }

        function saveAllChanges() {
            const saveBtn = document.getElementById('save-btn');
            const originalContent = saveBtn.innerHTML;

            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';

            const payload = {
                items: Object.keys(pendingChanges).map(id => ({
                    id: parseInt(id),
                    ...pendingChanges[id]
                }))
            };

            fetch('/api/menu/batch-update', {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            })
            .then(response => {
                if (response.ok) {
                    showToast('Alterações salvas com sucesso!');
                    setTimeout(() => location.reload(), 1500);
                } else {
                    throw new Error('Erro ao salvar.');
                }
            })
            .catch(error => {
                console.error('Error saving changes:', error);
                showToast('Erro ao salvar alterações. Tente novamente.', 'error');
                saveBtn.disabled = false;
                saveBtn.innerHTML = originalContent;
            });
        }
    </script>
</body>

</html>
