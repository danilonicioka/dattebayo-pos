version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dattebayo_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-restaurant_pos}
      POSTGRES_USER: ${POSTGRES_USER:-pos_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pos_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pos_user} -d ${POSTGRES_DB:-restaurant_pos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  backend:
    build:
      context: ./src
      dockerfile: backend/Dockerfile
      network: host
    image: danilonicioka/dattebayo-backend:latest
    container_name: dattebayo_backend_prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-restaurant_pos}
      DB_USER: ${POSTGRES_USER:-pos_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-pos_password}
      TZ: America/Sao_Paulo
      JAVA_TOOL_OPTIONS: -Duser.timezone=America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  pgdata_prod:
